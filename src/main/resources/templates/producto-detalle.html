<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Detalle producto - ViniloTFG Admin</title>

  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/incidencia.css">
  <link rel="stylesheet" href="/css/theme.css">
</head>

<body>

<div class="layout">

  <div th:replace="~{fragments/sidebar :: sidebar}"></div>

  <main class="main-content">

    <div id="productContent" style="display:none;">

      <div class="detail-topbar">
        <div>
          <p class="breadcrumb">
            <a href="/">Dashboard</a> / <a href="/productos">Productos</a> / Detalle
          </p>
          <h1 id="productTitle"></h1>
        </div>

        <div class="detail-actions-bar">
          <button class="secondary-btn" type="button" onclick="window.location.href='/productos'">
            ← Volver
          </button>

          <button class="primary-btn" type="button" onclick="guardarCambiosProducto()">
            Guardar cambios
          </button>

          <button class="secondary-btn" type="button" onclick="eliminarProducto()">
            Eliminar producto
          </button>
        </div>
      </div>

      <div class="detail-grid">

        <div class="panel">
          <h2>Editar producto</h2>

          <form id="editProductForm">
            <div class="form-grid">

              <div>
                <label>SKU</label>
                <input type="text" id="editProductSku" required>
              </div>

              <div>
                <label>Nombre</label>
                <input type="text" id="editProductNombre" required>
              </div>

              <div>
                <label>Artista</label>
                <input type="text" id="editProductArtista" required>
              </div>

              <div>
                <label>Género</label>
                <input type="text" id="editProductGenero" required>
              </div>

              <div>
                <label>Precio</label>
                <input type="number" id="editProductPrecio" step="0.01" min="0" required>
              </div>

              <div>
                <label>Stock</label>
                <input type="number" id="editProductStock" min="0" required>
              </div>

              <div>
                <label>Nueva imagen</label>
                <input type="file" id="editProductImagen" accept="image/*">
              </div>

            </div>

            <div style="margin-top:24px;">
              <label>Descripción</label>
              <textarea id="editProductDescripcion" required></textarea>
            </div>
          </form>
        </div>

        <div class="panel">
          <h2>Vista previa</h2>

          <div style="margin-bottom:20px;">
            <img id="detailProductImage" src="" alt="Imagen del producto" style="width:180px; height:180px; object-fit:cover; border-radius:16px; border:1px solid #2a2f38;">
          </div>

          <div class="detail-meta-row">
            <div class="meta-item">
              <span>Precio</span>
              <strong id="detailProductPrecio"></strong>
            </div>

            <div class="meta-item">
              <span>Stock</span>
              <strong id="detailProductStock"></strong>
            </div>

            <div class="meta-item" id="productStatusBox">
              <span>Estado</span>
            </div>

            <div class="meta-item">
              <span>Creado</span>
              <strong id="detailProductFecha"></strong>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div id="noProductMessage" class="panel" style="display:none; max-width:700px;">
      <h2 style="margin-bottom:10px;">No hay ningún producto seleccionado</h2>
      <p style="color:#a1a7b3; line-height:1.6; margin-bottom:20px;">
        Para ver el detalle de un producto, vuelve al listado y haz clic sobre uno de la tabla.
      </p>
      <button class="primary-btn" type="button" onclick="window.location.href='/productos'">
        Ir a productos
      </button>
    </div>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase.js"></script>
<script src="/js/shared.js"></script>
<script src="/js/productos.js"></script>

</body>
</html>
