<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Clientes - ViniloTFG Admin</title>

  <!-- Hojas de estilo -->
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/theme.css">
</head>

<body>

<div class="layout">

  <!-- Sidebar reutilizable -->
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>

  <!-- Contenido principal -->
  <main class="main-content">

    <!-- Encabezado -->
    <header class="topbar">
      <div>
        <h1>Gestión de clientes</h1>
        <p>Consulta y gestiona los clientes registrados</p>
      </div>
    </header>

    <!-- Estadísticas -->
    <section class="stats-grid">
      <div class="stat-card">
        <p>Clientes totales</p>
        <h3 id="totalClientes"></h3>
      </div>

      <div class="stat-card">
        <p>Clientes activos</p>
        <h3 id="clientesActivos"></h3>
      </div>

      <div class="stat-card">
        <p>Socios</p>
        <h3 id="clientesSocios"></h3>
      </div>

      <div class="stat-card">
        <p>Nuevos este mes</p>
        <h3 id="clientesNuevosMes"></h3>
      </div>
    </section>

    <!-- Listado -->
    <section class="panel">
      <div class="panel-header">
        <h2>Listado de clientes</h2>
      </div>

      <div class="filters">
        <input type="text" id="searchCliente" placeholder="Buscar cliente...">
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Email</th>
              <th>Nº socio</th>
              <th>Nivel</th>
              <th>Puntos disponibles</th>
            </tr>
          </thead>

          <tbody id="clientesTable"></tbody>
        </table>
      </div>
    </section>

  </main>

</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase.js"></script>
<script src="/js/shared.js"></script>
<script src="/js/clientes.js"></script>

</body>
</html>
