<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Nueva incidencia - ViniloTFG Admin</title>

  <!-- Hojas de estilo -->
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/theme.css">
</head>

<body>

<div class="layout">

  <!-- Sidebar reutilizable -->
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>

  <!-- Contenido principal -->
  <main class="main-content">

    <!-- Cabecera -->
    <div class="panel-header">
      <div>
        <h1 data-i18n="newIncident.title">Nueva incidencia</h1>
        <p data-i18n="newIncident.subtitle">Registra manualmente una devolución o incidencia asociada a un pedido</p>
      </div>
    </div>

    <!-- Formulario -->
    <div class="panel">

      <form id="formIncidencia">

        <div class="form-grid">

          <div>
            <label for="pedido" data-i18n="newIncident.orderId">ID del pedido</label>
            <input
              type="text"
              id="pedido"
              placeholder="Pega aquí el ID del pedido"
              data-i18n-placeholder="newIncident.orderIdPlaceholder"
              required
            >
          </div>

          <div>
            <label for="tipo" data-i18n="newIncident.reason">Motivo</label>
            <select id="tipo" required>
              <option value="" data-i18n="newIncident.selectReason">Selecciona un motivo</option>
              <option value="Talla/formato incorrecto" data-i18n="newIncident.reasonSizeFormat">Talla/formato incorrecto</option>
              <option value="Llegó dañado" data-i18n="newIncident.reasonDamaged">Llegó dañado</option>
              <option value="Producto incorrecto" data-i18n="newIncident.reasonWrongProduct">Producto incorrecto</option>
              <option value="Retraso en el envío" data-i18n="newIncident.reasonShippingDelay">Retraso en el envío</option>
              <option value="Otro" data-i18n="newIncident.reasonOther">Otro</option>
            </select>
          </div>

          <div>
            <label for="estado" data-i18n="newIncident.initialStatus">Estado inicial</label>
            <select id="estado" required>
              <option value="Pendiente" data-i18n="newIncident.statusPending">Pendiente</option>
              <option value="En revisión" data-i18n="newIncident.statusReview">En revisión</option>
              <option value="Aprobada" data-i18n="newIncident.statusApproved">Aprobada</option>
              <option value="Rechazada" data-i18n="newIncident.statusRejected">Rechazada</option>
            </select>
          </div>

        </div>

        <div style="margin-top:20px;">
          <label for="descripcion" data-i18n="newIncident.description">Descripción</label>
          <textarea
            id="descripcion"
            rows="5"
            placeholder="Describe brevemente el problema o motivo de la devolución"
            data-i18n-placeholder="newIncident.descriptionPlaceholder"
            required
          ></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="primary-btn" data-i18n="newIncident.save">
            Guardar incidencia
          </button>

          <button type="button" class="secondary-btn" onclick="window.location.href='/'" data-i18n="newIncident.cancel">
            Cancelar
          </button>
        </div>

      </form>

    </div>

  </main>

</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase.js"></script>
<script src="/js/shared.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/incidencias.js"></script>

</body>
</html>
