<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Nuevo producto</title>

  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/theme.css">
</head>

<body>

  <div class="layout">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="main-content">

      <header class="topbar">
        <div>
          <h1>Nuevo producto</h1>
          <p>Crear un nuevo vinilo en el catálogo</p>
        </div>
      </header>

      <section class="panel">
        <form id="nuevoProductoForm">

          <div class="form-grid">
            <div>
              <label>Nombre</label>
              <input type="text" id="nombre" required>
            </div>

            <div>
              <label>SKU</label>
              <input type="text" id="sku" placeholder="Ej: VIN-001" required>
            </div>

            <div>
              <label>Artista</label>
              <input type="text" id="artista" required>
            </div>

            <div>
              <label>Género</label>
              <input type="text" id="genero" required>
            </div>

            <div>
              <label>Precio</label>
              <input type="number" id="precio" step="0.01" min="0" required>
            </div>

            <div>
              <label>Stock</label>
              <input type="number" id="stock" min="0" required>
            </div>

            <div>
              <label>Imagen del producto</label>
              <input type="file" id="imagen" accept="image/*">
            </div>
          </div>

          <div style="margin-top:24px;">
            <label>Descripción</label>
            <textarea id="descripcion" required></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="primary-btn">Crear producto</button>
            <button type="button" class="secondary-btn" onclick="window.location.href='/productos'">Cancelar</button>
          </div>

        </form>
      </section>

    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="/js/shared.js"></script>
  <script src="/js/nuevo-producto.js"></script>

</body>

</html>
